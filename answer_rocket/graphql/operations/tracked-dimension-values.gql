query GetTrackedDimensionValues($datasetId: UUID!) {
  getTrackedDimensionValues(datasetId: $datasetId) {
    watchSetId
    id
    tuples {
      dimensionAttributeId
      dimensionName
      value
    }
  }
}

query GetAllTrackedDimensionValues(
  $offset: Int
  $limit: Int
  $datasetId: UUID
  $filters: JSON
  $sort: JSON
) {
  getAllTrackedDimensionValues(
    offset: $offset
    limit: $limit
    datasetId: $datasetId
    filters: $filters
    sort: $sort
  ) {
    totalCount
    rows {
      watchSetId
      userId
      userName
      userEmail
      datasetId
      datasetName
      tuples {
        dimensionAttributeId
        dimensionName
        value
      }
      tuplesKey
      isTracked
      starredUtc
      unstarredUtc
      lastModifiedUtc
    }
  }
}
